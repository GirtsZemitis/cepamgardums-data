name: Build & push image to ghcr.io

# Builds the Docker image and pushes it to GitHub Container Registry (private,
# tied to this repo). Connect the Azure Container App to pull
# ghcr.io/girtszemitis/cepamgardums-data:latest with a read:packages token.

on:
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/girtszemitis/cepamgardums-data:latest
            ghcr.io/girtszemitis/cepamgardums-data:${{ github.sha }}
